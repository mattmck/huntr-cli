name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  release:
    name: Create Release & Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only version bumps in package.json should create releases.

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Get version from package.json
        id: package
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Verify release tag exists on origin
        run: |
          git fetch --tags origin

          if ! git rev-parse "refs/tags/${{ steps.package.outputs.tag }}" >/dev/null 2>&1; then
            echo "Missing tag ${{ steps.package.outputs.tag }} on origin."
            echo "Push the version tag with: git push origin main --tags"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Create distribution archives
        run: |
          mkdir -p dist-archives
          cd dist
          tar -czf ../dist-archives/huntr-cli-${{ steps.package.outputs.version }}.tar.gz .
          zip -r ../dist-archives/huntr-cli-${{ steps.package.outputs.version }}.zip .
          cd ..

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.package.outputs.tag }}
          name: Version ${{ steps.package.outputs.version }}
          commit: ${{ github.sha }}
          generateReleaseNotes: true
          allowUpdates: true
          draft: false
          prerelease: ${{ contains(steps.package.outputs.version, '-') }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.package.outputs.version }}
          path: dist-archives/
          retention-days: 90

      - name: Notify release created
        run: |
          echo "✅ Release v${{ steps.package.outputs.version }} created!"
          echo "   Tag: ${{ steps.package.outputs.tag }}"
          echo "   Artifacts uploaded"
          echo "   npm publishing runs from publish.yml on the pushed version tag."
